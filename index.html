<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找着了，就是你。</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      flex-direction: column;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .dog {
      max-width: 400px;
      width: 90%;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(247, 151, 30, 0.3);
      margin-bottom: 1rem;
    }
    .caption {
      font-size: 0.9rem;
      color: #666;
    }
    .loading { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>找着了，就是你。</h1>
  <img class="dog loading" id="dog" alt="一只看着你的狗" />
  <div class="caption">find.exp.dog</div>
  <script>
    fetch('https://dog.ceo/api/breeds/image/random')
      .then(r => r.json())
      .then(d => {
        const img = document.getElementById('dog');
        img.src = d.message;
        img.classList.remove('loading');
      });
  </script>
</body>
</html>
