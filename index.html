<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找着了，就是你。</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      flex-direction: column;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .dog {
      font-size: 8rem;
      animation: bounce 0.6s infinite alternate ease-in-out;
    }
    @keyframes bounce {
      from { transform: translateY(0) rotate(-3deg); }
      to   { transform: translateY(-15px) rotate(3deg); }
    }
    .footer {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.9rem;
      color: #555;
    }
    .share-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all .2s;
    }
    .share-btn:hover { border-color: #f7971e; color: #f7971e; }
    .share-btn.copied { border-color: #4ade80; color: #4ade80; }
  </style>
</head>
<body>
  <h1>找着了，就是你。</h1>
  <div class="dog">🐶</div>
  <div class="footer">
    <span>find.exp.dog</span>
    <button class="share-btn" onclick="copyLink()">📋 复制链接</button>
  </div>
  <script>
    function copyLink() {
      const btn = document.querySelector('.share-btn');
      navigator.clipboard.writeText('https://find.exp.dog').then(() => {
        btn.textContent = '✅ 已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 复制链接';
          btn.classList.remove('copied');
        }, 1500);
      });
    }
  </script>
</body>
</html>
