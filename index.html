<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>找着了，就是你。- find.exp.dog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#243b55,#141826 60%,#0b0d13);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{width:min(92%,760px);padding:30px 0}
.panel{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);padding:28px;border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.45);margin-bottom:20px}
h1{text-align:center;font-size:clamp(2rem,6vw,3.6rem);background:linear-gradient(90deg,#ffb347,#ffd54d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#b8c0d0;margin:8px 0 20px}
#scan{font-family:Consolas,monospace;background:#0b1220;padding:18px;border-radius:14px}
.line{display:flex;justify-content:space-between;padding:6px 0;color:#8fe388}
.bar{height:10px;background:#233;overflow:hidden;border-radius:99px;margin:16px 0}
.fill{height:100%;width:0;background:linear-gradient(90deg,#48d26d,#8cff8c);transition:width .4s}
#result{display:none;text-align:center;animation:fade .5s}
.dog{font-size:8rem;display:inline-block;animation:wag 1s infinite alternate ease-in-out}
@keyframes wag{from{transform:rotate(-6deg)}to{transform:rotate(6deg)}}
.quote{margin:18px;color:#d6d6d6;font-size:1.1rem;min-height:1.5em}
.counter{margin-top:12px;color:#ffd54d;font-size:.95rem}
.btns{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:18px}
button{border:none;border-radius:10px;padding:12px 20px;cursor:pointer;font-size:15px;transition:all .2s}
.primary{background:#ffbf47;color:#1a1a2e;font-weight:600}
.primary:hover{background:#ffc967;transform:translateY(-2px)}
.secondary{background:#374151;color:#fff}
.secondary:hover{background:#4b5563}
.secondary.copied{background:#4ade80!important;color:#1a1a2e!important}
#wallPanel{display:none}
.wall{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px}
.wall h3{font-size:1rem;color:#888;margin-bottom:12px}
.wall-list{max-height:200px;overflow-y:auto;margin-bottom:12px}
.wall-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.9rem;color:#ccc}
.wall-input{display:flex;gap:8px}
.wall-input input{flex:1;background:#0b1220;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:8px;outline:none;font-size:.9rem}
.wall-input input:focus{border-color:#ffbf47}
footer{text-align:center;margin-top:20px;color:#7f8794}
@keyframes fade{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.shake{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.flash{animation:flash .35s}
@keyframes flash{0%{background:radial-gradient(circle at top,#243b55,#141826 60%,#0b0d13)}50%{background:radial-gradient(circle at top,#ffd54d,#141826 60%,#0b0d13)}100%{background:radial-gradient(circle at top,#243b55,#141826 60%,#0b0d13)}}
</style>
</head>
<body>
<div class="wrap">
<div class="panel" id="panel">
<h1>🔍 正在全网寻找水经验的人…</h1>
<div class="sub">find.exp.dog 正在分析论坛发帖记录</div>
<div id="scan">
<div class="line"><span>✓ 已连接论坛数据库</span><span id="s1">0%</span></div>
<div class="bar"><div class="fill" id="f"></div></div>
<div class="line"><span id="status">准备扫描…</span><span>Scanning...</span></div>
</div>
<div id="result">
<h1>🎯 找着了，就是你。</h1>
<p class="sub">（不要慌，只是随机抽中的一只狗 🐶）</p>
<div class="dog" id="dog">🐶</div>
<div class="quote" id="quote"></div>
<div class="counter" id="counter"></div>
<div class="btns">
<button class="primary" onclick="nextDog()">🐶 再抓一只</button>
<button class="secondary" id="shareBtn" onclick="share()">📋 分享</button>
</div>
</div>
</div>

<div class="panel wall" id="wallPanel">
<h3>🐾 水狗留言墙</h3>
<div class="wall-list" id="wallList">加载中…</div>
<div class="wall-input">
<input id="wallInput" placeholder="被抓到了，留下句话…" maxlength="60" onkeydown="if(event.key==='Enter')postMsg()">
<button class="secondary" style="padding:8px 14px;font-size:.85rem" onclick="postMsg()">🐶</button>
</div>
</div>

<footer id="footer" style="display:none">
  find.exp.dog &nbsp;|&nbsp;
  留言墙内容为用户发布，不代表本站立场 &nbsp;|&nbsp;
  Messages are user-generated and do not reflect the views of this site
</footer>
</div>
<script>
const API = 'https://dog-kv-api.trueadou.workers.dev';
let visited = sessionStorage.getItem('v') === '1';

function api(url, opts){
  return fetch(API+url, opts).then(r=>r.json()).catch(()=>null);
}

function loadCounter(){
  api('/api/count').then(d=>{
    if(d) document.getElementById('counter').textContent = '🏆 你是第 '+d.count+' 个被找到的水狗';
  });
}

function loadWall(){
  api('/api/messages').then(msgs=>{
    const el = document.getElementById('wallList');
    if(!msgs || !msgs.length){ el.innerHTML='<div style="color:#666;font-size:.85rem">还没有留言，做第一个被抓到的狗 🐶</div>'; return; }
    el.innerHTML = msgs.reverse().map(m=>{
      const t = new Date(m.time*1000);
      const ts = t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      return '<div class="wall-item">'+ts+' —— '+esc(m.text)+'</div>';
    }).join('');
  });
}

function postMsg(){
  const inp = document.getElementById('wallInput');
  const text = inp.value.trim();
  if(!text) return;
  inp.disabled = true;
  api('/api/messages', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})})
    .then(r=>{
      if(r && r.ok){ inp.value=''; loadWall(); }
      else if(r && r.error) alert(r.error);
    })
    .finally(()=>{ inp.disabled = false; });
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

const tips=[
"经验+1。",
"今天也是认真水经验的一天。",
"已通知版主（假的）。",
"水帖嫌疑人已锁定。",
"论坛最靓的狗出现了。",
"放心，这只是随机抽中的狗。",
"今日水经验指数：99%。"
];
const dogs=["🐶","🐕","🦮","🐕‍🦺","🐩","🦴","🐾"];

function hit(){
  if(visited) return;
  visited = true;
  sessionStorage.setItem('v','1');
  api('/api/hit', {method:'POST'}).then(d=>{
    if(d) document.getElementById('counter').textContent = '🏆 你是第 '+d.count+' 个被找到的水狗';
  });
}

function nextDog(){
  const q=document.getElementById('quote');
  const d=document.getElementById('dog');
  d.textContent=dogs[Math.floor(Math.random()*dogs.length)];
  q.textContent=tips[Math.floor(Math.random()*tips.length)];
}

function share(){
  const url=location.href;
  const btn=document.getElementById('shareBtn');
  const ok=()=>{
    btn.textContent="✅ 已复制";
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent="📋 分享";btn.classList.remove('copied');},1500);
  };
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(url).then(ok,fallback);
  }else{fallback();}
  function fallback(){
    const ta=document.createElement('textarea');
    ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');ok();}
    catch(e){prompt("手动复制：",url);}
    document.body.removeChild(ta);
  }
}

const msgs=["读取发帖记录...","分析水经验指数...","锁定可疑目标...","目标确认..."];
let p=0,i=0;
const t=setInterval(()=>{
  p+=5;
  document.getElementById('f').style.width=p+"%";
  document.getElementById('s1').textContent=p+"%";
  document.getElementById('status').textContent=msgs[Math.min(i,msgs.length-1)];
  if(p%25===0)i++;
  if(p>=100){
    clearInterval(t);
    document.body.classList.add('flash');
    document.getElementById('panel').classList.add('shake');
    setTimeout(()=>{
      document.body.classList.remove('flash');
      document.getElementById('scan').style.display='none';
      document.getElementById('result').style.display='block';
      document.getElementById('wallPanel').style.display='block';
      document.getElementById('footer').style.display='block';
      nextDog();
      hit();
      loadCounter();
      loadWall();
    },450);
  }
},100);
</script>
</body></html>
